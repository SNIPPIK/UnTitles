name: Build Native
on:
  push:
    branches: [ "main", "beta" ]
    tags-ignore:
      - '**'
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npx napi build --release --target x86_64-unknown-linux-gnu --cargo-cwd ./src-rs
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npx napi build --release --target x86_64-pc-windows-msvc --cargo-cwd ./src-rs
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npx napi build --release --target aarch64-unknown-linux-gnu --cargo-cwd ./src-rs
          - host: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            build: npx napi build --release --target armv7-unknown-linux-gnueabihf --cargo-cwd ./src-rs

    name: build-${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Setup zig
        if: contains(matrix.settings.build, '--use-zig')
        uses: goto-bus-stop/setup-zig@v2

      - name: Install dependencies
        run: npm install

      - name: Build
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: build/native/*.node
          if-no-files-found: error