name: Build Rust Modules
on:
  push:
    branches: [ "main", "beta" ]
    tags-ignore:
      - '**'
  pull_request:

env:
  DEBUG: 'napi:*' # Помогает отладить, если билд упадет

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin

          # Linux (glibc)
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-zig: true
          - host: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use-zig: true

          # Linux (musl) - важно для Alpine
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-zig: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-zig: true

          # Windows
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: i686-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc

          # Android
          - host: ubuntu-latest
            target: aarch64-linux-android
            use-zig: true
          - host: ubuntu-latest
            target: armv7-linux-androideabi
            use-zig: true

          # FreeBSD
          - host: ubuntu-latest
            target: x86_64-unknown-freebsd
            use-zig: true

    name: build-${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'

      - name: Setup package.json
        run: npm run build:copy

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      - name: Install Zig
        if: ${{ matrix.settings.use-zig }}
        uses: goto-bus-stop/setup-zig@v2

      - name: Install dependencies
        run: npm install

      - name: Build
        shell: bash
        run: |
          # Формируем аргументы сборки
          ARGS="--release --target ${{ matrix.settings.target }} --platform"
          
          # Если используем Zig для кросс-компиляции
          if [ "${{ matrix.settings.use-zig }}" == "true" ]; then
            ARGS="$ARGS --use-zig"
          fi
          
          # Запуск сборки
          npx napi build $ARGS --cwd ./rs --js index.cjs

      - name: Prepare native build folder
        shell: bash
        run: |
          mkdir -p build/native
          cp index.cjs build/native/ 2>/dev/null || true
          cp *.ts build/native/ 2>/dev/null || true
          cp *.node build/native/ 2>/dev/null || true
          cp rs/*.node build/native/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: build/native
          if-no-files-found: error