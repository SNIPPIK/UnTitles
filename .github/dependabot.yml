version: 2
updates:
  # Обновления для Node.js
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns:
          - "*"

  # Обновления для Rust
  - package-ecosystem: "cargo"
    directory: "/src-rs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    versioning-strategy: auto

  # Обновления для GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"